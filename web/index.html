<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="cache-control" content="no-cache">
  <title>Shanghai Earth Wallpaper</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    body { margin: 0; background: #05070a; color: #eef6ff; }
    main { max-width: 980px; margin: auto; padding: 40px 20px 64px; }
    h1 { font-size: clamp(28px, 5vw, 52px); margin: 0 0 8px; }
    #status { color: #9eb4c9; margin-bottom: 28px; }
    .install { display: inline-block; margin: 0 0 28px; padding: 11px 16px; border-radius: 999px; background: #e8f5ff; color: #06111b; font-weight: 650; text-decoration: none; }
    .setup { margin: 0 0 28px; padding: 20px 22px; border: 1px solid #1d2b38; border-radius: 22px; background: #0a0e13; }
    .setup h2 { margin: 0 0 12px; font-size: 20px; }
    .setup ol { margin: 0; padding-left: 22px; color: #c7d5e2; line-height: 1.65; }
    .setup li + li { margin-top: 8px; }
    .meta { margin: 14px 0 0; color: #8297aa; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 22px; }
    figure { margin: 0; padding: 12px; border: 1px solid #1d2b38; border-radius: 24px; background: #0a0e13; }
    img { display: block; width: 100%; border-radius: 16px; }
    figcaption { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px 2px; }
    a { color: #93d3ff; }
  </style>
</head>
<body>
<main>
  <h1>上海 · 实时地球壁纸</h1>
  <p id="status">正在读取最新观测时间…</p>
  <a class="install" href="更新上海实时地球.shortcut">安装 iPhone 快捷指令</a>
  <section class="setup">
    <h2>iPhone 设置</h2>
    <ol>
      <li>点击上方按钮，将“更新上海实时地球”加入快捷指令。</li>
      <li>手动运行一次，允许联网和更换锁定屏幕、主屏幕权限。</li>
      <li>在“快捷指令 → 自动化”建立 24 个“特定时间”，从 00:45 到 23:45，均运行该快捷指令，选择立即运行并关闭通知。</li>
    </ol>
    <p class="meta">云端每小时 :33 检查并补跑，iPhone 在 :45 换图。</p>
  </section>
  <section class="grid">
    <figure><img id="lock" src="lock.jpg" alt="Lock wallpaper"><figcaption><span>Lock</span><a id="lock-link" href="lock.jpg">原图</a></figcaption></figure>
    <figure><img id="home" src="home.jpg" alt="Home wallpaper"><figcaption><span>Home</span><a id="home-link" href="home.jpg">原图</a></figcaption></figure>
  </section>
</main>
<script>
fetch('manifest.json?ts=' + Date.now(), {cache: 'no-store'})
  .then(r => r.json())
  .then(m => {
    const observed = new Date(m.observation_utc).toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'});
    const rendered = new Date(m.rendered_utc);
    const ageMinutes = Math.max(0, Math.round((Date.now() - rendered.getTime()) / 60000));
    const health = ageMinutes <= 90 ? '自动更新正常' : '更新延迟';
    const source = m.source_status === 'fresh' ? '最新卫星数据' : '缓存降级';
    document.querySelector('#status').textContent = `${health} · 卫星观测 ${observed} · ${source}`;
    for (const name of ['lock', 'home']) {
      const url = `${name}.jpg?v=${m.artifacts[name].sha256.slice(0, 16)}`;
      document.querySelector(`#${name}`).src = url;
      document.querySelector(`#${name}-link`).href = url;
    }
  });
</script>
</body>
</html>
