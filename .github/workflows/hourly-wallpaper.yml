name: Hourly Earth Wallpaper

on:
  workflow_call:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: earthwall-pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/cache@v6
        with:
          path: cache
          key: earthwall-cache-${{ runner.os }}
          restore-keys: earthwall-cache-${{ runner.os }}-
      - run: pip install .
      - run: python -m unittest discover -s tests -v
      - run: earthwall --cache cache --output public
      - run: earthwall-qa public | tee public/qa.json
      - run: cp web/* public/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Keep public-repository schedule active
        if: github.event_name == 'schedule'
        run: |
          if [[ "$(date -u '+%d %H')" != "01 00" ]]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          date -u '+%FT%TZ' > .github/schedule-heartbeat
          git add .github/schedule-heartbeat
          git commit -m "chore keep hourly schedule active [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
