name: Hourly Earth Wallpaper

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: earthwall-pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/cache@v4
        with:
          path: cache
          key: earthwall-cache-${{ runner.os }}
          restore-keys: earthwall-cache-${{ runner.os }}-
      - run: pip install .
      - run: earthwall --cache cache --output public
      - run: earthwall-qa public | tee public/qa.json
      - run: cp web/* public/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
